# McpVanguard polyglot deployment (Node + Python)
# Explicitly defines the environment for Railway / Nixpacks.

[phases.setup]
nixPkgs = ["python311", "nodejs_20", "gcc"]

[phases.install]
cmds = [
  "npm install",
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install .[full]"
]

[start]
cmd = "/opt/venv/bin/python3 -m core.cli sse --host 0.0.0.0 --server \"$MCP_SERVER_COMMAND\" --semantic --behavioral"
