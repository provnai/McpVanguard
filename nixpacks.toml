# McpVanguard Polyglot Deployment (Node + Python)
# Explicitly defines the environment for Railway/Nixpacks

[phases.setup]
nixPkgs = ["python311Full", "nodejs_20", "gcc"]

[phases.install]
cmds = [
  "npm install",
  "python3 -m pip install -r requirements.txt",
  "python3 -m pip install -e ."
]

[deploy]
startCommand = "python3 -m core.cli sse --server \"$MCP_SERVER_COMMAND\" --semantic --behavioral"
