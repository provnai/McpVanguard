name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Test Suite (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install build
          pip install -e ".[dev]"

      - name: Build distributions
        run: python -m build

      - name: Smoke install built wheel
        run: |
          python -m venv .smoke-venv
          . .smoke-venv/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl
          vanguard --help

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Test rule counts
        run: |
          PYTHONPATH=. python -c "
          from core.rules_engine import RulesEngine
          engine = RulesEngine(rules_dir='rules')
          print(f'Loaded {engine.rule_count} rules')
          assert engine.rule_count >= 30, f'Expected 30+ rules, got {engine.rule_count}'
          print('Rule count check passed')
          "

  windows-test:
    name: Run Windows Test Suite (${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  install-modes:
    name: Verify Optional Install Modes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Minimal install without optional Redis/RE2 extras
        run: |
          python -m venv .minimal-venv
          . .minimal-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install .
          python -c "from core import safe_regex; from core.proxy import ProxyConfig; print('backend=', safe_regex.backend_name(), 'profile=', ProxyConfig().profile)"
          vanguard --help

      - name: Full install with optional deployment extras
        run: |
          python -m venv .full-venv
          . .full-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install ".[full]"
          python -c "import redis; from core import safe_regex; print('redis=', redis.__version__, 'backend=', safe_regex.backend_name())"
          vanguard --help
