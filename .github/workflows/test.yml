name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install build
          pip install -e ".[dev]"

      - name: Build distributions
        run: python -m build

      - name: Smoke install built wheel
        run: |
          python -m venv .smoke-venv
          . .smoke-venv/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl
          vanguard --help

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Test rule counts
        run: |
          PYTHONPATH=. python -c "
          from core.rules_engine import RulesEngine
          engine = RulesEngine(rules_dir='rules')
          print(f'Loaded {engine.rule_count} rules')
          assert engine.rule_count >= 30, f'Expected 30+ rules, got {engine.rule_count}'
          print('Rule count check passed')
          "
