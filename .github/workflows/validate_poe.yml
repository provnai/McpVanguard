name: Validate Proof of Exploit

on:
  issues:
    types: [opened, labeled]

jobs:
  validate:
    name: Validate PoE
    # Only run when the exploit-submission label is present
    if: contains(github.event.issue.labels.*.name, 'exploit-submission')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Extract PoE from issue
        id: extract
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python scripts/parse_poe_issue.py "$ISSUE_BODY" > poe_extracted.json
          cat poe_extracted.json
          echo "poe_path=poe_extracted.json" >> $GITHUB_OUTPUT

      - name: Replay exploit
        id: replay
        run: |
          python scripts/replay_exploit.py poe_extracted.json > replay_result.json
          cat replay_result.json
          
          # Check if validation passed
          RESULT=$(python -c "import json; d=json.load(open('replay_result.json')); print(d.get('validated', False))")
          echo "validated=$RESULT" >> $GITHUB_OUTPUT
          echo "result_file=replay_result.json" >> $GITHUB_OUTPUT

      - name: Award points on success
        if: steps.replay.outputs.validated == 'True'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python scripts/award_points.py \
            poe_extracted.json \
            replay_result.json \
            "${{ github.event.issue.user.login }}"

      - name: Comment success on issue
        if: steps.replay.outputs.validated == 'True'
        uses: actions/github-script@v7
        with:
          script: |
            const result = require('./replay_result.json');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ Exploit Validated!
            
            **Level ${result.level}** bypass confirmed. Points awarded!
            
            | Detail | Value |
            |--------|-------|
            | PoE ID | \`${result.poe_id}\` |
            | Level | ${result.level} |
            | Points | **${result.points_awarded}** |
            | Replay Status | ✅ SUCCESS_CONDITION confirmed |
            
            Your submission has been added to the global signatures database.
            Check your score on the [🏆 Leaderboard](https://mcpvanguard.vercel.app/leaderboard)!
            
            Thank you for making MCP safer! 🛡️`
            });
            
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['validated']
            });
            
            github.rest.issues.removeLabel({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'exploit-submission'
            });

      - name: Comment failure on issue
        if: steps.replay.outputs.validated == 'False'
        uses: actions/github-script@v7
        with:
          script: |
            let result = {};
            try { result = require('./replay_result.json'); } catch(e) {}
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ Validation Failed
            
            The replay of your Proof of Exploit could not confirm the SUCCESS_CONDITION.
            
            **Reason:** ${result.error || 'SUCCESS_CONDITION not triggered during replay'}
            
            **What to check:**
            - Is the PoE JSON unmodified from the hunter tool output?
            - Did you submit the full \`conversation_log\` array?
            - Is the bypass deterministic (same result every time)?
            
            If you believe this is a validator error, please comment below with details.`
            });
            
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['rejected']
            });
