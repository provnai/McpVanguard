- id: MCP-01
  title: Identity Spoofing
  status: partial
  summary: Vanguard authenticates HTTP clients when an API key is configured, but does not yet provide full principal-aware auth for all deployments.
  controls:
    - API key and bearer-token checks on SSE and Streamable HTTP requests
  evidence:
    - core/sse_server.py:_check_auth
    - tests/test_sse_hardening.py
- id: MCP-02
  title: Credential and Token Theft
  status: gap
  summary: The proxy does not yet redact, vault, or formally model credential-bearing tool flows.
  controls: []
  evidence: []
- id: MCP-03
  title: Session Hijacking
  status: partial
  summary: Streamable HTTP sessions are securely generated, validated, lifecycle-managed, and bound to transport identity, but not yet to authenticated principals.
  controls:
    - Cryptographically random session identifiers
    - Session-id format validation
    - Coarse binding to client IP, Origin, and User-Agent
  evidence:
    - core/sse_server.py:VanguardStreamableSessionManager
    - tests/test_streamable_http.py
- id: MCP-04
  title: Privilege Escalation and Confused Deputy
  status: partial
  summary: Deterministic rules and safe zones reduce confused-deputy behavior, but there is no full authorization model for upstream capabilities yet.
  controls:
    - Layer 1 static rules
    - Safe-zone jail enforcement
  evidence:
    - core/rules_engine.py
    - core/jail.py
    - tests/test_jail_logic.py
- id: MCP-05
  title: Excessive Permissions and Overexposure
  status: partial
  summary: Safe zones and rule-based blocks reduce overexposure, but tool permissions are still inferred from request content rather than a formal least-privilege manifest.
  controls:
    - Tool/path jail checks
    - Command and network rule packs
  evidence:
    - rules/safe_zones.yaml
    - rules/commands.yaml
    - rules/network.yaml
- id: MCP-06
  title: Pending Primary-Source Title Sync
  status: gap
  summary: This taxonomy slot is intentionally marked as a gap until the repo syncs the exact MCP-38 title and mitigation mapping from the primary paper appendix.
  controls: []
  evidence: []
- id: MCP-07
  title: Command Injection
  status: partial
  summary: Vanguard blocks many command-execution patterns through static signatures, but does not yet verify all shell and interpreter execution surfaces exhaustively.
  controls:
    - Command rule pack
    - Semantic scoring fallback
  evidence:
    - rules/commands.yaml
    - core/semantic.py
    - tests/test_rules.py
- id: MCP-08
  title: File System Exposure and Path Traversal
  status: implemented
  summary: File access is guarded by deterministic safe-zone jails plus filesystem-specific signatures.
  controls:
    - Safe-zone jail enforcement
    - Filesystem rule pack
  evidence:
    - core/jail.py
    - core/rules_engine.py
    - rules/filesystem.yaml
    - tests/test_jail_logic.py
- id: MCP-09
  title: Pending Primary-Source Title Sync
  status: partial
  summary: Network and request-shape controls reduce some remote-access abuse paths, but this slot needs a paper-accurate title and tighter mapping.
  controls:
    - Network rule pack
    - Body-size and content-type validation
  evidence:
    - rules/network.yaml
    - core/sse_server.py:_validate_message_request
- id: MCP-10
  title: Tool Description Poisoning
  status: implemented
  summary: Tool-list metadata is inspected on the server-to-agent path and can be warned, blocked, or filtered per tool.
  controls:
    - Deterministic metadata inspection
    - Metadata policy modes block, warn, and drop-tool
  evidence:
    - core/metadata_inspection.py
    - core/proxy.py
    - tests/test_metadata_poisoning.py
- id: MCP-11
  title: Full Schema Poisoning
  status: implemented
  summary: Nested tool schema metadata such as descriptions, titles, defaults, examples, enum values, and array item descriptions are inspected before reaching the model.
  controls:
    - Recursive schema metadata traversal
  evidence:
    - core/metadata_inspection.py
    - tests/test_metadata_poisoning.py
- id: MCP-12
  title: Resource Content Poisoning
  status: gap
  summary: Vanguard does not yet inspect prompt/resource list metadata and resource contents with the same rigor as tool metadata.
  controls: []
  evidence: []
- id: MCP-13
  title: Tool Shadowing
  status: partial
  summary: Tool metadata inspection and enrichment reduce obvious shadowing attempts, but there is not yet a dedicated duplicate-name or authority-conflict detector.
  controls:
    - Metadata inspection
    - Tool enrichment surface
  evidence:
    - core/proxy.py:_enrich_tool_list
    - tests/test_proxy_enrichment.py
- id: MCP-14
  title: Name Spoofing
  status: partial
  summary: Metadata inspection covers suspicious textual behavior, but there is no dedicated anti-spoof normalization or reserved-name policy yet.
  controls:
    - Metadata inspection on tool names and titles
  evidence:
    - core/metadata_inspection.py
- id: MCP-15
  title: Preference Manipulation
  status: gap
  summary: The proxy does not yet model preference-state attacks or long-lived agent memory manipulation explicitly.
  controls: []
  evidence: []
- id: MCP-16
  title: Rug Pull
  status: gap
  summary: Upstream server behavior and capability drift are not yet pinned to an integrity manifest.
  controls: []
  evidence: []
- id: MCP-17
  title: Parasitic Tool Chaining
  status: partial
  summary: Behavioral analysis tracks suspicious request patterns, but there is not yet a chaining-specific policy engine across multi-step tool plans.
  controls:
    - Session-window behavioral analysis
  evidence:
    - core/behavioral.py
    - tests/test_behavioral.py
- id: MCP-18
  title: Pending Primary-Source Title Sync
  status: gap
