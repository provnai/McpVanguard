- id: MCP-31
  title: DNS Rebinding
  status: partial
  summary: Safer bind defaults and Origin validation reduce browser-origin abuse, but there is no dedicated DNS rebinding detector or deployment attestation.
  controls:
    - Loopback-safe default bind
    - Origin allowlist and required-Origin mode
  evidence:
    - core/sse_server.py
    - tests/test_sse_hardening.py
- id: MCP-32
  title: Unrestricted Network Access and Lateral Movement
  status: partial
  summary: Network signatures catch many dangerous calls, but there is not yet a full egress-control or destination allowlist system.
  controls:
    - Network rule pack
  evidence:
    - rules/network.yaml
- id: MCP-33
  title: Resource Exhaustion and Denial of Wallet
  status: partial
  summary: Rate limits, concurrency guards, regex timeouts, and body-size caps harden the gateway against some exhaustion attacks, but there is no cost-aware policy engine yet.
  controls:
    - Token-bucket rate limiting
    - Per-IP and global concurrency caps
    - Regex timeout guard
    - Body-size limits
  evidence:
    - core/sse_server.py
    - core/rules_engine.py
    - tests/test_sse_hardening.py
- id: MCP-34
  title: Pending Primary-Source Title Sync
  status: partial
  summary: Current transport and lifecycle checks cover part of this slot's likely protocol-abuse surface, but the exact MCP-38 title still needs to be synced from the paper appendix.
  controls:
    - Session lifecycle validation
  evidence:
    - tests/test_streamable_http.py
