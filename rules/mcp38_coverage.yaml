- id: MCP-19
  title: Direct Prompt Injection
  status: partial
  summary: Prompt-injection-like behavior is addressed indirectly through regex rules, semantic scoring, and metadata inspection, but not with a dedicated prompt-policy layer.
  controls:
    - Jailbreak rule pack
    - Semantic scoring
    - Metadata inspection
  evidence:
    - rules/jailbreak.yaml
    - core/semantic.py
    - core/metadata_inspection.py
- id: MCP-20
  title: Indirect Prompt Injection
  status: partial
  summary: Metadata poisoning controls and semantic analysis catch part of the indirect-prompt surface, but resource and content ingestion still need fuller coverage.
  controls:
    - Metadata inspection on initialize and tools/list
    - Semantic scoring layer
  evidence:
    - core/proxy.py
    - core/metadata_inspection.py
- id: MCP-21
  title: Overreliance on LLM Safeguards
  status: implemented
  summary: The architecture is explicitly layered so deterministic controls act as the primary boundary and semantic scoring is optional and secondary.
  controls:
    - Layer 1 before Layer 2 ordering
    - Semantic layer optionality
  evidence:
    - core/proxy.py
    - core/rules_engine.py
    - MCPVANGUARD_ENGINEERING_ROADMAP.md
- id: MCP-22
  title: Human-in-the-Loop Bypass
  status: gap
  summary: Vanguard does not yet enforce approval gates or human confirmation workflows for sensitive operations.
  controls: []
  evidence: []
- id: MCP-23
  title: Consent Fatigue
  status: gap
  summary: The product does not yet model repeated approval pressure or consent-harvesting patterns.
  controls: []
  evidence: []
- id: MCP-24
  title: Data Exfiltration via Tool Output
  status: partial
  summary: Behavioral analysis and large-response heuristics can flag suspicious output patterns, but there is no dedicated content DLP pipeline.
  controls:
    - Large-response detection
    - High-entropy output heuristics
  evidence:
    - core/behavioral.py
    - tests/test_behavioral.py
- id: MCP-25
  title: Privacy Inversion
  status: partial
  summary: Some exfiltration patterns are constrained, but the system does not yet explicitly model cross-tool aggregation or inference attacks over benign-looking reads.
  controls:
    - Behavioral read/write sequence tracking
  evidence:
    - core/behavioral.py
- id: MCP-26
  title: Supply Chain Compromise
  status: partial
  summary: Signed rule bundles protect Vanguard's own signature distribution, but upstream MCP servers and packages are not yet covered by the same integrity model.
  controls:
    - Signed rules manifest
    - Detached signature verification
  evidence:
    - core/signing.py
    - tests/test_rules_manifest.py
    - tests/test_cli_update.py
- id: MCP-27
  title: Missing Integrity Verification
  status: partial
  summary: Rule content integrity is verified, but there is no manifest or pinning yet for the wrapped upstream MCP server itself.
  controls:
    - Rule manifest hashing
    - Detached signature verification
  evidence:
    - core/signing.py
    - rules/manifest.json
    - rules/manifest.sig.json
