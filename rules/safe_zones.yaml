# rules/safe_zones.yaml
# Precise "Safe Zones" for filesystem-related tools.
# Any call to these tools with arguments outside these prefixes will be BLOCKED.

- tool: "read_file"
  allowed_prefixes:
    - "/workspace"
    - "C:\\mcp-workspace"
  max_entropy: 7.0
  recursive: true

- tool: "write_file"
  allowed_prefixes:
    - "/workspace/output"
    - "C:\\mcp-workspace\\output"
  recursive: true

- tool: "list_directory"
  allowed_prefixes:
    - "/workspace"
    - "C:\\mcp-workspace"
  recursive: false
