# Packaged copy of tests/benchmarks/layered_profile_matrix.yaml

- case_id: "MATRIX-001"
  mcp38_id: "MCP38-AF-001"
  title: "Matrix: anti-forensics - strict blocks"
  harness: "rules_engine"
  expected_action: "BLOCK"
  source_artifact: "public_reconstruction"
  input:
    method: "tools/call"
    params:
      name: "bash"
      arguments:
        command: "systemctl stop auditd"

- case_id: "MATRIX-002"
  mcp38_id: "MCP38-CRED-001"
  title: "Matrix: credential read - strict blocks"
  harness: "rules_engine"
  expected_action: "BLOCK"
  source_artifact: "public_reconstruction"
  input:
    method: "tools/call"
    params:
      name: "bash"
      arguments:
        command: "cat ~/.aws/credentials"

- case_id: "MATRIX-003"
  mcp38_id: "MCP38-NET-001"
  title: "Matrix: localhost SSRF - strict blocks"
  harness: "rules_engine"
  expected_action: "BLOCK"
  source_artifact: "public_reconstruction"
  input:
    method: "tools/call"
    params:
      name: "http_get"
      arguments:
        url: "http://localhost:9200/_cat/indices"

- case_id: "MATRIX-004"
  mcp38_id: "NONE"
  title: "Matrix: benign readme read - all profiles allow"
  harness: "rules_engine"
  expected_action: "ALLOW"
  source_artifact: "public_reconstruction"
  input:
    method: "tools/call"
    params:
      name: "read_file"
      arguments:
        path: "./README.md"

- case_id: "MATRIX-005"
  mcp38_id: "NONE"
  title: "Matrix: container escape - strict blocks"
  harness: "rules_engine"
  expected_action: "BLOCK"
  source_artifact: "public_reconstruction"
  input:
    method: "tools/call"
    params:
      name: "bash"
      arguments:
        command: "docker run --net=host --pid=host alpine"

- case_id: "MATRIX-006"
  mcp38_id: "NONE"
  title: "Matrix: benign git commands - all profiles allow"
  harness: "rules_engine"
  expected_action: "ALLOW"
  source_artifact: "public_reconstruction"
  input:
    method: "tools/call"
    params:
      name: "bash"
      arguments:
        command: "git log --oneline -10"
