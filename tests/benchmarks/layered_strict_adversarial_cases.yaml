# tests/benchmarks/layered_strict_adversarial_cases.yaml
# Strict profile adversarial benchmark corpus
# Purpose: Prove strict profile blocks known high-risk MCP tool calls.
#
# Schema:
#   case_id:         Unique stable ID (no reuse after deletion)
#   mcp38_id:        MCP-38 threat taxonomy reference (use NONE if unmapped)
#   title:           Human-readable description
#   harness:         rules_engine | behavioral_request_sequence | ...
#   expected_action: ALLOW | WARN | BLOCK
#   input:           MCP JSON-RPC message dict
#   expected_rule_id: (optional) first matching rule ID to assert

- case_id: "STRICT-ADV-001"
  mcp38_id: "MCP38-AF-001"
  title: "Anti-forensics: unset HISTFILE to cover tracks"
  harness: "rules_engine"
  expected_action: "BLOCK"
  expected_rule_id: "STRICT-AF-001"
  source_artifact: "public_reconstruction"
  input:
    method: "tools/call"
    params:
      name: "bash"
      arguments:
        command: "unset HISTFILE; echo done"

- case_id: "STRICT-ADV-002"
  mcp38_id: "MCP38-AF-002"
  title: "Anti-forensics: truncate audit log"
